<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>UniQampüs</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#DC2626" />
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <style>
    :root { --red:#DC2626; --ink:#111827; --muted:#6B7280; --card:#FFFFFF; --border:#F0D9D5; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; height:100%; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:linear-gradient(160deg,#FFF7F5 0%,#FDECEA 100%); color:var(--ink);
      display:flex; align-items:center; justify-content:center; min-height:100%; padding:24px;
    }
    .card {
      width:100%; max-width:380px; background:var(--card); border:1px solid var(--border);
      border-radius:24px; padding:32px 24px; text-align:center; box-shadow:0 12px 40px rgba(220,38,38,0.10);
    }
    .logo {
      width:72px; height:72px; border-radius:20px; margin:0 auto 18px; display:block;
      object-fit:cover; background:#fff; box-shadow:0 8px 24px rgba(220,38,38,0.18);
    }
    h1 { font-size:21px; font-weight:800; margin:0 0 6px; letter-spacing:-0.3px; }
    p { font-size:14.5px; line-height:1.5; color:var(--muted); margin:0 0 22px; }
    .code { display:inline-block; background:#FEF2F2; color:var(--red); font-weight:700; padding:4px 12px; border-radius:999px; font-size:13px; margin-bottom:18px; }
    .btn { display:block; width:100%; padding:15px 16px; border-radius:14px; font-size:16px; font-weight:700; text-decoration:none; margin-bottom:12px; border:none; cursor:pointer; }
    .btn-primary { background:var(--red); color:#fff; box-shadow:0 6px 18px rgba(220,38,38,0.30); }
    .btn-ghost { background:#fff; color:var(--ink); border:1px solid #E5E7EB; }
    .stores { display:flex; gap:10px; justify-content:center; }
    .stores a { flex:1; }
    .foot { margin-top:18px; font-size:12px; color:#9CA3AF; }
    .foot a { color:#9CA3AF; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <img class="logo" src="/assets/logo.jpg" alt="UniQampüs" />
    <h1 id="title">Sayfa bulunamadı</h1>
    <div class="code" id="code" hidden></div>
    <p id="desc">Aradığın sayfa taşınmış ya da hiç var olmamış olabilir.</p>
    <div id="actions">
      <a class="btn btn-primary" href="https://uniqampus.org">Ana sayfaya dön</a>
    </div>
    <div class="foot"><a href="https://uniqampus.org">uniqampus.org</a></div>
  </div>

  <script>
    (function () {
      var APP_STORE = "https://apps.apple.com/app/id6773794797";
      var PLAY_STORE = "https://play.google.com/store/apps/details?id=com.uniqampus.app";

      // GitHub Pages /r/* ve /e/* wildcard desteklemez → bu 404 sayfası yakalar.
      var mr = location.pathname.match(/^\/r\/([^\/?#]+)/); // davet (referral)
      var me = location.pathname.match(/^\/e\/([^\/?#]+)/); // esnaf QR
      if (!mr && !me) return; // ne davet ne esnaf → normal 404 göster.

      var isEsnaf = !!me;
      var code = decodeURIComponent((me || mr)[1]);
      var ua = navigator.userAgent || "";
      var isIOS = /iPhone|iPad|iPod/i.test(ua) || (/(Macintosh)/i.test(ua) && "ontouchend" in document);
      var isAndroid = /Android/i.test(ua);
      var store = isIOS ? APP_STORE : isAndroid ? PLAY_STORE : null;
      var scheme = "uniqampus://" + (isEsnaf ? "e/" : "r/") + encodeURIComponent(code);

      // 404 görünümünü esnaf/davet görünümüne çevir.
      document.getElementById("title").textContent = isEsnaf
        ? "Öğrenci indirimin hazır!"
        : "UniQampüs'e davet edildin!";
      document.getElementById("desc").textContent = isEsnaf
        ? "Bu esnafın UniQampüs öğrenci indirimini görmek için uygulamayı aç ya da indir."
        : "Kampüsün dijital meydanı — etkinlikler, ilanlar, forum ve daha fazlası. Uygulamayı aç ya da indir, davetinle başla.";
      // Esnaf QR kodu iç kod olduğundan gösterilmez; davet kodu gösterilir.
      if (code && !isEsnaf) {
        var c = document.getElementById("code");
        c.textContent = "Davet kodu: " + code; c.hidden = false;
      }
      var actions = document.getElementById("actions");
      actions.innerHTML =
        '<a class="btn btn-primary" id="openApp" href="' + scheme + '">Uygulamada Aç</a>' +
        '<div class="stores">' +
        (isAndroid ? '' : '<a class="btn btn-ghost" href="' + APP_STORE + '">App Store</a>') +
        (isIOS ? '' : '<a class="btn btn-ghost" href="' + PLAY_STORE + '">Google Play</a>') +
        '</div>';

      document.getElementById("openApp").addEventListener("click", function (e) {
        e.preventDefault();
        var t = setTimeout(function () { if (store) location.href = store; }, 1200);
        window.addEventListener("pagehide", function () { clearTimeout(t); });
        location.href = scheme;
      });

      // App kuruluysa universal link sayfayı hiç açmadan app'i açar. Sayfa açıldıysa
      // büyük ihtimalle kurulu değil → kısa gecikmeyle mağazaya yönlendir.
      if (store) setTimeout(function () { location.href = store; }, 2500);
    })();
  </script>
</body>
</html>
